<div class="contact-form">
    <!-- Usunęliśmy action i method stąd, zajmie się tym skrypt poniżej -->
    <form id="frameworkForm">
        
        <!-- Konfiguracja FormSubmit -->
        <input type="text" name="_honey" style="display:none">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="Nowa wiadomość z Framework Studio">

        <div class="form-group">
            <label for="name">Imię i Nazwisko</label>
            <input type="text" id="name" name="name" required> 
        </div>
        
        <div class="form-group">
            <label for="email">Adres E-mail</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="subject">Temat</label>
            <input type="text" id="subject" name="topic" placeholder="np. Wycena, Współpraca">
        </div>

        <div class="form-group">
            <label for="message">Treść Wiadomości</label>
            <textarea id="message" name="message" required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">Wyślij Wiadomość</button>
    </form>

    <!-- Komunikat sukcesu (domyślnie ukryty) -->
    <div id="successMsg" style="display:none; color: green; font-weight: bold; margin-top: 20px; text-align: center;">
        ✅ Dziękujemy! Wiadomość została wysłana.
    </div>
</div>

<script>
    const form = document.getElementById('frameworkForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Zatrzymuje przeładowanie strony i błąd 404
        btn.disabled = true;
        btn.innerText = 'Wysyłanie...';

        const formData = new FormData(form);

        try {
            const response = await fetch('https://formsubmit.co/ajax/antekku9@gmail.com', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                form.style.display = 'none'; // Ukrywa formularz
                msg.style.display = 'block'; // Pokazuje sukces
            } else {
                alert('Wystąpił błąd. Spróbuj ponownie później.');
                btn.disabled = false;
                btn.innerText = 'Wyślij Wiadomość';
            }
        } catch (error) {
            alert('Błąd połączenia. Sprawdź internet.');
            btn.disabled = false;
            btn.innerText = 'Wyślij Wiadomość';
        }
    });
</script>
