<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – Framework Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE FRAMEWORK STUDIO --- */
        :root {
            --primary-color: #222;
            --accent-color: #c5a059; /* Złoty akcent */
            --bg-light: #fdfdfd;
            --text-muted: #666;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--primary-color);
        }

        /* --- NAWIGACJA --- */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        nav a:hover, nav a.active {
            color: var(--accent-color);
        }

        .nav-cta {
            border: 1px solid var(--accent-color);
            padding: 5px 15px;
            border-radius: 4px;
        }

        /* --- SEKCJA KONTAKT --- */
        .contact-section {
            padding: 80px 5%;
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 60px;
        }

        .contact-section h2 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            grid-column: 1 / -1; 
            text-align: center;
        }

        /* --- DANE KONTAKTOWE --- */
        .contact-info h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            position: relative;
        }
        
        .contact-info h3::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--accent-color);
            margin-top: 10px;
        }
        
        .contact-info p {
            margin-bottom: 15px;
            font-size: 1rem;
            color: var(--primary-color);
            line-height: 1.6;
        }
        
        .contact-info a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .contact-info a:hover {
            color: var(--accent-color);
        }
        
        .social-icons {
            margin-top: 30px;
        }
        
        .social-icons a {
            display: inline-block;
            margin-right: 10px;
            font-size: 0.9rem;
            color: var(--primary-color);
            text-decoration: none;
        }

        /* --- FORMULARZ --- */
        .contact-form {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .form-group {
            margin-bottom: 20px;
        }

        .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        .contact-form input:focus, .contact-form textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .contact-form textarea {
            resize: vertical;
            min-height: 150px;
        }

        .contact-form button {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .contact-form button:hover {
            background: #a8874f;
        }
        
        /* --- STOPKA --- */
        footer {
            padding: 40px;
            font-size: 0.8rem;
            color: #999;
            border-top: 1px solid #eee;
            margin-top: 80px;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }

        .footer-year { display: block; margin-bottom: 5px; }
        .footer-main-brand { font-weight: 700; font-size: 0.9rem; color: var(--primary-color); }
        .footer-sub-brand { font-weight: 500; font-size: 0.65rem; letter-spacing: 3px; }

        @media (max-width: 768px) {
            .contact-section { grid-template-columns: 1fr; padding-top: 40px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="portfolio.html">Portfolio</a>
    <a href="oferta.html">Oferta</a>
    <a href="index.html">O mnie</a>
    <a href="kontakt.html" class="nav-cta active">Kontakt</a>
</nav>

<section class="contact-section">
    <h2>Napisz do mnie</h2>

    <div class="contact-info">
        <h3>Dane Kontaktowe</h3>
        <p>Zazwyczaj odpowiadam w ciągu 24 godzin (pon-pt). Chętnie przygotuję dla Ciebie wycenę.</p>

        <p><strong>Telefon:</strong> <a href="tel:+48575996200">+48 575 996 200</a></p>
        <p><strong>E-mail:</strong> <a href="mailto:antekku9@gmail.com">info@frameworkstudio.pl</a></p>
        
        <div class="social-icons">
            <h3>Social Media</h3>
            <a href="https://www.instagram.com/frameworkstudio/" target="_blank">Instagram</a> | 
            <a href="https://www.linkedin.com/in/antoni-kuran/" target="_blank">LinkedIn</a> |
            <a href="https://www.facebook.com/frameworkstudio/" target="_blank">Facebook</a>
        </div>
    </div>

    <div class="contact-form">
        <!-- FORMULARZ DO FORMSUBMIT.CO -->
        <form action="https://formsubmit.co/info@frameworkstudio.pl" method="POST">
            
            <!-- Honeypot anty-spam -->
            <input type="text" name="_honey" style="display:none">
            
            <!-- Brak Captcha -->
            <input type="hidden" name="_captcha" value="false">
            
            <!-- Temat maila -->
            <input type="hidden" name="_subject" value="Nowa wiadomość ze strony Framework Studio">

            <div class="form-group">
                <label for="name">Imię i Nazwisko</label>
                <input type="text" id="name" name="name" required> 
            </div>
            
            <div class="form-group">
                <label for="email">Adres E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="topic">Temat</label>
                <input type="text" id="topic" name="topic">
            </div>

            <div class="form-group">
                <label for="message">Treść Wiadomości</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            
            <button type="submit">Wyślij Wiadomość</button>
        </form>
    </div>
</section>

<footer>
    <span class="footer-year">© 2025</span>
    <span class="footer-main-brand">FRAMEWORK</span>
    <span class="footer-sub-brand">STUDIO</span>
</footer>

</body>
</html>
